<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Solid background (required for iOS) -->
  <rect width="180" height="180" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="90" cy="78" rx="62" ry="55" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="4" y="4" width="172" height="172" rx="34" fill="none"
    stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Corner accents -->
  <path d="M20 8 L10 8 Q6 8 6 12 L6 20" stroke="#fbbf24" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M160 8 L170 8 Q174 8 174 12 L174 20" stroke="#fbbf24" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M20 172 L10 172 Q6 172 6 168 L6 160" stroke="#fbbf24" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M160 172 L170 172 Q174 172 174 168 L174 160" stroke="#fbbf24" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Decorative ring -->
  <circle cx="90" cy="79" r="57" fill="none" stroke="#fbbf24" stroke-width="0.7" stroke-opacity="0.15"/>

  <!-- Main "ي" letter -->
  <text x="92" y="115"
    text-anchor="middle"
    font-family="'Arabic Typesetting','Noto Naskh Arabic',Arial,sans-serif"
    font-size="110" font-weight="900"
    fill="url(#gold)">ي</text>

  <!-- Divider -->
  <line x1="46" y1="138" x2="134" y2="138" stroke="#fbbf24" stroke-width="0.7" stroke-opacity="0.3"/>

  <!-- Brand text -->
  <text x="90" y="158"
    text-anchor="middle"
    font-family="'Arabic Typesetting','Noto Naskh Arabic',Arial,sans-serif"
    font-size="15" font-weight="700"
    fill="#fbbf24" opacity="0.85">آل ياسين</text>
</svg>
