<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedBox">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ambient glow behind the letter -->
  <ellipse cx="256" cy="230" rx="175" ry="155" fill="url(#glow)"/>

  <!-- Outer thin border -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none"
    stroke="url(#goldRing)" stroke-width="2.5" stroke-opacity="0.45"/>

  <!-- Inner subtle border -->
  <rect x="22" y="22" width="468" height="468" rx="94" fill="none"
    stroke="#fbbf24" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Decorative corner marks - top left -->
  <path d="M56 24 L28 24 Q18 24 18 34 L18 56"
    stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- top right -->
  <path d="M456 24 L484 24 Q494 24 494 34 L494 56"
    stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- bottom left -->
  <path d="M56 488 L28 488 Q18 488 18 478 L18 456"
    stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- bottom right -->
  <path d="M456 488 L484 488 Q494 488 494 478 L494 456"
    stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Large decorative ring behind letter -->
  <circle cx="256" cy="225" r="162" fill="none"
    stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.12"/>
  <circle cx="256" cy="225" r="148" fill="none"
    stroke="#fbbf24" stroke-width="0.75" stroke-opacity="0.1"/>

  <!-- THE MAIN "ي" LETTER -->
  <text x="260" y="325"
    text-anchor="middle"
    font-family="'Arabic Typesetting','Noto Naskh Arabic','Scheherazade New',Arial,sans-serif"
    font-size="310"
    font-weight="900"
    fill="url(#gold)"
    filter="url(#textGlow)">ي</text>

  <!-- Divider line -->
  <line x1="130" y1="390" x2="382" y2="390"
    stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Brand name bottom -->
  <text x="256" y="432"
    text-anchor="middle"
    font-family="'Arabic Typesetting','Noto Naskh Arabic',Arial,sans-serif"
    font-size="44" font-weight="700"
    fill="#fbbf24" opacity="0.88">آل ياسين</text>

  <!-- Tiny dots decoration -->
  <circle cx="122" cy="411" r="3" fill="#fbbf24" opacity="0.35"/>
  <circle cx="390" cy="411" r="3" fill="#fbbf24" opacity="0.35"/>
  <circle cx="108" cy="411" r="1.5" fill="#fbbf24" opacity="0.2"/>
  <circle cx="404" cy="411" r="1.5" fill="#fbbf24" opacity="0.2"/>
</svg>
