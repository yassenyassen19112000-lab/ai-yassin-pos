<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#1a1a2e"/>
  <rect x="6" y="6" width="168" height="168" rx="32" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Outer circle ring -->
  <circle cx="90" cy="86" r="56" fill="none" stroke="#f59e0b" stroke-width="6" stroke-opacity="0.25"/>

  <!-- Green circle background for checkmark -->
  <circle cx="90" cy="86" r="46" fill="#16a34a"/>

  <!-- Inner glow ring -->
  <circle cx="90" cy="86" r="46" fill="none" stroke="#22c55e" stroke-width="3"/>

  <!-- Bold checkmark -->
  <polyline points="62,88 80,108 120,66"
    stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Arabic text -->
  <text x="90" y="162" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="19" font-weight="bold"
    fill="#f59e0b" letter-spacing="0.5">ياسين</text>
</svg>
